<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodEye - IP Sorgu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg width="50" height="50" viewBox="0 0 100 100">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                    <ellipse cx="50" cy="50" rx="30" ry="35" fill="none" stroke="#e94560" stroke-width="3" filter="url(#glow)"/>
                    <circle cx="50" cy="45" r="12" fill="#e94560" filter="url(#glow)"/>
                    <circle cx="50" cy="45" r="5" fill="#1a1a2e"/>
                    <path d="M15 30 Q50 10 85 30" fill="none" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                    <path d="M15 70 Q50 90 85 70" fill="none" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                    <line x1="30" y1="15" x2="25" y2="5" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                    <line x1="70" y1="15" x2="75" y2="5" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                    <line x1="30" y1="85" x2="25" y2="95" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                    <line x1="70" y1="85" x2="75" y2="95" stroke="#e94560" stroke-width="2" filter="url(#glow)"/>
                </svg>
                <span class="logo-text">Blood<span class="logo-accent">Eye</span></span>
            </div>
        </div>
        <textarea id="ipInput" placeholder="IP adreslerini alt alta girin...&#10;Örn:&#10;8.8.8.8&#10;1.1.1.1"></textarea>
        <button id="sorguBtn">Sorgula</button>
        <button id="exportBtn" style="display:none; background:#0f3460;">Excel'e Aktar (CSV)</button>
        <div id="sonuc"></div>
        <div id="listeler" style="display:none;">
            <div class="liste-kutu blacklist">
                <div class="liste-baslik">⛔ Black List <span class="liste-aciklama">(AbuseIPDB ≥20 veya ipinfo ≥20)</span></div>
                <textarea id="blacklist" readonly placeholder="Black list IP'leri burada görünür..."></textarea>
            </div>
            <div class="liste-kutu whitelist">
                <div class="liste-baslik">✅ White List <span class="liste-aciklama">(Tüm puanlar &lt;20)</span></div>
                <textarea id="whitelist" readonly placeholder="White list IP'leri burada görünür..."></textarea>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
